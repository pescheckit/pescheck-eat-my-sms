name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            extra_pkg: ""
          - arch: arm64
            extra_pkg: "binutils-aarch64-linux-gnu"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper-compat config-package-dev python3-pip git-buildpackage curl ${{ matrix.extra_pkg }}

      - name: Generate changelog from commits
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          export DEBEMAIL="github-actions@github.com"
          export DEBFULLNAME="GitHub Actions"

          git checkout -b temp-build-branch
          gbp dch --new-version="$VERSION" \
                  --distribution=unstable \
                  --release \
                  --ignore-branch \
                  --spawn-editor=never

      - name: Build package
        run: |
          dpkg-buildpackage -uc -us --host-arch ${{ matrix.arch }}
          mv ../*.deb .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eat-my-sms-${{ matrix.arch }}
          path: "*.deb"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download amd64 package
        uses: actions/download-artifact@v4
        with:
          name: eat-my-sms-amd64
          path: ./packages

      - name: Download arm64 package
        uses: actions/download-artifact@v4
        with:
          name: eat-my-sms-arm64
          path: ./packages

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./packages/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
