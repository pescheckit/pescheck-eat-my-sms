name: Publish to APT Repository

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            extra_pkg: ""
          - arch: arm64
            extra_pkg: "binutils-aarch64-linux-gnu"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper-compat config-package-dev python3-pip git-buildpackage curl ${{ matrix.extra_pkg }}

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          export DEBEMAIL="github-actions@github.com"
          export DEBFULLNAME="GitHub Actions"
          git checkout -b temp-build-branch
          gbp dch --new-version="$VERSION" \
                  --distribution=stable \
                  --release \
                  --ignore-branch \
                  --spawn-editor=never

      - name: Build package
        run: |
          dpkg-buildpackage -uc -us --host-arch ${{ matrix.arch }}
          mv ../*.deb .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eat-my-sms-${{ matrix.arch }}
          path: "*.deb"

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/*/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-apt:
    name: Publish APT Repository
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -d "gh-pages" ]; then
            mkdir -p gh-pages/apt/conf
            cd gh-pages
            git init
            git checkout -b gh-pages
          fi

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # If no GPG key secret exists, generate one
          if ! gpg --list-secret-keys | grep -q .; then
            echo "Generating GPG key..."
            gpg --batch --gen-key <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 4096
          Name-Real: Eat My SMS Repository
          Name-Email: noreply@github.com
          Expire-Date: 0
          EOF
            # Export for display
            gpg --armor --export noreply@github.com > gh-pages/apt/public.key
            echo "⚠️  GPG key generated. Save the private key to secrets.GPG_PRIVATE_KEY:"
            gpg --armor --export-secret-keys noreply@github.com
          fi

      - name: Setup reprepro config
        run: |
          mkdir -p gh-pages/apt/conf
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | sed 's/.*\/\([^ ]*\) .*/\1/')
          cat > gh-pages/apt/conf/distributions <<EOF
          Origin: Eat My SMS
          Label: eat-my-sms
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: Eat My SMS Package Repository
          SignWith: ${GPG_KEY_ID}
          EOF

      - name: Add packages to repository
        run: |
          cd gh-pages/apt
          for deb in ../../packages/*/*.deb; do
            reprepro includedeb stable "$deb"
          done

      - name: Export GPG public key
        run: |
          gpg --armor --export > gh-pages/apt/public.key

      - name: Create index.html
        run: |
          cat > gh-pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Eat My SMS APT Repository</title></head>
          <body>
            <h1>Eat My SMS APT Repository</h1>
            <h2>Installation</h2>
            <pre>
          # Import GPG key
          curl -fsSL https://pescheckit.github.io/eat-my-sms/apt/public.key | sudo gpg --dearmor -o /etc/apt/keyrings/eat-my-sms.gpg

          # Add repository
          echo "deb [signed-by=/etc/apt/keyrings/eat-my-sms.gpg] https://pescheckit.github.io/eat-my-sms/apt stable main" | \
            sudo tee /etc/apt/sources.list.d/eat-my-sms.list

          # Install
          sudo apt update
          sudo apt install eat-my-sms
            </pre>
            <p><a href="https://github.com/pescheckit/eat-my-sms">View on GitHub</a></p>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: false
