stages:
  - build
  - test
  - deploy

.build: &build
  image: debian
  stage: build
  script:
    - apt update && apt install -y debhelper-compat config-package-dev python3-pip git-buildpackage $EXTRA_PKG
    # Auto-generate changelog from git commits using gbp dch
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION=${CI_COMMIT_TAG#v}  # Remove 'v' prefix from tag
        export DEBEMAIL="gitlab-ci@pescheck.io"
        export DEBFULLNAME="GitLab CI"

        # Use gbp dch to automatically generate changelog from git commits
        gbp dch --new-version="$VERSION" \
                --distribution=unstable \
                --release \
                --commit-msg="Update changelog for $VERSION release" \
                --spawn-editor=never
      fi
    - dpkg-buildpackage -uc -us --host-arch $ARCH
    - mv ../*.deb ./
  artifacts:
    paths:
      - "*.deb"

build-amd64:
  <<: *build
  variables:
    ARCH: amd64

build-arm64:
  <<: *build
  variables:
    ARCH: arm64
    EXTRA_PKG: binutils-aarch64-linux-gnu

test-install:
  image: debian:testing
  stage: test
  dependencies:
    - build-amd64
  before_script:
    - apt update && apt install -y gnokii-cli python3 openssl systemd-standalone-sysusers
  script:
    - dpkg -i eat-my-sms_*_amd64.deb

# Upload Debian packages to GitLab Package Registry
deploy-packages:
  stage: deploy
  image: curlimages/curl:latest
  dependencies:
    - build-amd64
    - build-arm64
  script:
    # Upload amd64 package
    - |
      for DEB in *.deb; do
        ARCH=$(echo $DEB | grep -oP '(?<=_)[^_]+(?=\.deb)')
        echo "Uploading $DEB (arch: $ARCH)..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ${DEB} \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/debian/${DEB}?distribution=stable&component=main&architecture=${ARCH}"
      done
  rules:
    - if: $CI_COMMIT_TAG  # Only upload on tagged releases
