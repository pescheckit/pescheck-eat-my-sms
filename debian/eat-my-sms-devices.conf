# Configuration for eat-my-sms device auto-detection
# This file is sourced by eat-my-sms-start-all.sh

# Maximum number of devices to start (default: 8)
MAX_DEVICES=8

# Device pattern to search for (default: ttyUSB*)
# Examples:
#   DEVICE_PATTERN="ttyUSB*"   # USB hubs
#   DEVICE_PATTERN="ttyACM*"   # Direct USB modems
#   DEVICE_PATTERN="tty{USB,ACM}*"  # Both
DEVICE_PATTERN="ttyUSB*"
